name: Release to npm

# Publish @pocketjs/framework and @pocketjs/cli when a v* tag is pushed
# (e.g. `git tag v0.2.0 && git push origin v0.2.0`). Auth is npm Trusted
# Publishing (OIDC): each package's npm Settings names this repo + workflow
# file as a trusted publisher, so no token or secret is involved and npm
# attaches provenance automatically. Publishing is idempotent: versions
# already on the registry are skipped, so re-running a tag or bumping only
# one package is safe.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (for example, 0.4.0)
        required: true
        type: string

permissions:
  contents: write # GitHub Release creation
  id-token: write # npm --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # This is intentionally before toolchain setup or publish work. A tag or
      # manual input can only release the exact version committed in all three
      # public version authorities.
      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: bun tools/release-check.ts "$RELEASE_VERSION"

      # npm (not bun) does the publishing. Trusted Publishing needs npm >=
      # 11.5.1 (Node 22 bundles 10.x), and no registry-url: setup-node's
      # auth-token .npmrc placeholder would fail without a token env var.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # hosts/web/pocketjs.wasm is a gitignored build artifact shipped in the
      # framework tarball, so build it from engine/core/wasm. Stable Rust suffices.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + wasm target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/wasm/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('engine/wasm/Cargo.toml', 'engine/core/Cargo.toml', 'engine/wasm/src/**', 'engine/core/src/**') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build wasm (core + software rasterizer)
        run: bun tools/wasm.ts

      - name: Test JavaScript and package contracts
        run: bun run test

      # The app build at the start of `bun run test` generates the local style
      # module that TypeScript intentionally imports.
      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test Rust core
        run: cargo test --locked --manifest-path engine/core/Cargo.toml

      - name: Test desktop 3D and widget workspace
        run: cargo test --locked --manifest-path engine/Cargo.toml --workspace

      - name: Test renderer goldens
        run: bun tests/golden.ts

      - name: Test deterministic tape replay
        run: bun run tape:check

      - name: Build documentation and public schema
        run: |
          bun run site:build
          cmp contracts/schema/pocket-2.json site/dist/schema/pocket-2.json

      - name: Publish @pocketjs/framework
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already published — skipping"
          else
            npm publish --access public --provenance
          fi

      - name: Publish @pocketjs/cli
        working-directory: cli
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already published — skipping"
          else
            npm publish --access public --provenance
          fi

      # The GitHub Release mirrors the changelog entry for this version.
      # Idempotent like the npm steps: an existing release is left alone.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          tag="v${RELEASE_VERSION#v}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag release already exists — skipping"
          else
            bun tools/release-notes.ts "$tag" > "$RUNNER_TEMP/notes.md"
            gh release create "$tag" --verify-tag --latest \
              --title "$(bun tools/release-notes.ts "$tag" --title)" \
              --notes-file "$RUNNER_TEMP/notes.md"
          fi
