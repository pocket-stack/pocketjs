<!doctype html>
<!-- PocketJS DevTools panel: component tree + inspect highlight, pause/step,
     input-tape time travel, REPL + log stream. See DEVTOOLS.md.
     Served at http://127.0.0.1:8130/devtools by host-web/serve.ts; talks to
     devices over ws://<host>/ws?role=panel (one JSON object per WS message). -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PocketJS DevTools</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: #0b0e17; color: #cbd5e1;
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .hidden { display: none !important; }
  .dim { color: #64748b; }

  /* ---- header / status bar ---- */
  header {
    flex: none; display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: #0f172a; border-bottom: 1px solid #1e293b;
  }
  header h1 { font-size: 13px; font-weight: 600; margin: 0; color: #e2e8f0; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #64748b; flex: none; }
  .dot.ok { background: #4ade80; } .dot.warn { background: #fbbf24; } .dot.bad { background: #f87171; }
  #connText { color: #94a3b8; }
  #appInfo { color: #a5b4fc; }
  .spacer { flex: 1; }
  .chip { color: #94a3b8; font-size: 12px; white-space: nowrap; }
  .chip b { color: #e2e8f0; font-weight: 600; }
  #statPaused {
    background: #f59e0b22; color: #fbbf24; border: 1px solid #f59e0b55;
    border-radius: 4px; padding: 0 6px; font-size: 11px; letter-spacing: .06em;
  }
  #btnShot { font-size: 12px; padding: 3px 10px; }

  /* ---- screenshot thumbnail strip ---- */
  #shots {
    flex: none; display: flex; gap: 10px; align-items: flex-start;
    padding: 6px 12px; background: #0f172a; border-top: 1px solid #1e293b;
    overflow-x: auto;
  }
  .shot {
    flex: none; display: flex; flex-direction: column; align-items: center;
    gap: 2px; cursor: pointer; text-decoration: none;
  }
  .shot img {
    display: block; width: 120px; height: 68px; /* 480x272 aspect */
    image-rendering: pixelated; background: #000;
    border: 1px solid #334155; border-radius: 4px;
  }
  .shot:hover img { border-color: #818cf8; }
  .shot .cap { font-size: 11px; color: #64748b; }

  /* ---- main split ---- */
  main { flex: 1; display: grid; grid-template-columns: minmax(300px, 38%) 1fr; min-height: 0; }
  .panelTitle {
    flex: none; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: #64748b; padding: 5px 12px; background: #0f172a; border-bottom: 1px solid #1e293b;
  }

  /* ---- component tree (left) ---- */
  #treePanel { border-right: 1px solid #1e293b; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  #tree { flex: 1; overflow: auto; padding: 4px 0; outline: none; }
  #tree.stale { opacity: .5; }
  #treeEmpty { color: #475569; padding: 10px 12px; font-style: italic; }
  .row { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; padding: 1px 8px; cursor: pointer; }
  .row:hover { background: #1e293b88; }
  .row.pinned { background: #6366f133; box-shadow: inset 2px 0 0 #6366f1; }
  .caret { width: 14px; flex: none; color: #64748b; text-align: center; user-select: none; }
  .caret.none { color: #334155; }
  .row b { color: #e2e8f0; font-weight: 600; }
  .type { color: #a5b4fc; }
  .type.dim { color: #64748b; }
  .sum { color: #64748b; font-size: 12px; overflow: hidden; text-overflow: ellipsis; }
  .kids.hidden { display: none; }

  /* ---- right column: details over console ---- */
  #right { display: grid; grid-template-rows: minmax(130px, 34%) 1fr; min-width: 0; min-height: 0; }
  #details { border-bottom: 1px solid #1e293b; display: flex; flex-direction: column; min-height: 0; }
  #detailsBody { flex: 1; overflow: auto; padding: 8px 12px; }
  .kv { display: flex; gap: 10px; margin: 2px 0; }
  .kv .k { color: #64748b; width: 80px; flex: none; text-align: right; }
  .kv .v { color: #e2e8f0; min-width: 0; word-break: break-word; white-space: pre-wrap; }
  .pinTag { color: #818cf8; font-size: 11px; margin-left: 8px; }

  /* ---- console + REPL ---- */
  #consolePanel { display: flex; flex-direction: column; min-height: 0; }
  #consoleLog { flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 12px; }
  .line { white-space: pre-wrap; word-break: break-word; }
  .line.info { color: #93c5fd; }
  .line.warn { color: #fbbf24; }
  .line.error { color: #f87171; }
  .line.debug { color: #64748b; }
  .line.input { color: #818cf8; }
  .line.result { color: #4ade80; }
  .stack { margin: 2px 0 6px 14px; color: #f8717199; font-size: 11px; white-space: pre-wrap; }
  #replRow {
    flex: none; display: flex; gap: 8px; align-items: center;
    padding: 6px 12px; background: #0f172a; border-top: 1px solid #1e293b;
  }
  #replRow .prompt { color: #818cf8; user-select: none; }
  #repl { flex: 1; background: transparent; border: none; outline: none; color: #e2e8f0; font: inherit; }
  #repl::placeholder { color: #475569; }

  /* ---- time-travel bar ---- */
  footer {
    flex: none; display: flex; gap: 10px; align-items: center;
    padding: 8px 12px; background: #0f172a; border-top: 1px solid #1e293b;
  }
  .tbBtns { display: flex; gap: 6px; flex: none; }
  button {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
    border-radius: 6px; padding: 4px 10px; font: inherit; cursor: pointer;
  }
  button:hover { border-color: #475569; }
  button:active, button.active { background: #6366f1; border-color: #818cf8; }
  button:disabled { opacity: .4; cursor: default; }
  #strip {
    flex: 1; display: block; height: 44px; min-width: 120px;
    background: #0b0e17; border: 1px solid #1e293b; border-radius: 6px; cursor: crosshair;
  }
  #stripInfo { flex: none; color: #64748b; font-size: 12px; min-width: 170px; text-align: right; }
</style>
</head>
<body>

<header>
  <h1>PocketJS DevTools</h1>
  <span class="dot" id="connDot"></span>
  <span id="connText">connecting…</span>
  <span id="appInfo"></span>
  <span class="spacer"></span>
  <span class="chip">frame <b id="statFrame">–</b></span>
  <span class="chip">nodes <b id="statNodes">–</b></span>
  <span class="chip">tape <b id="statTape">–</b></span>
  <span class="chip hidden" id="statPaused">PAUSED</span>
  <button id="btnShot" title="capture the device screen as PNG">&#128247; Screenshot</button>
</header>

<main>
  <section id="treePanel">
    <div class="panelTitle">components</div>
    <div id="tree" tabindex="0">
      <div id="treeEmpty">waiting for device…</div>
      <div id="treeRows"></div>
    </div>
  </section>
  <div id="right">
    <section id="details">
      <div class="panelTitle">details</div>
      <div id="detailsBody"></div>
    </section>
    <section id="consolePanel">
      <div class="panelTitle">console</div>
      <div id="consoleLog"></div>
      <div id="replRow">
        <span class="prompt">&rsaquo;</span>
        <input id="repl" spellcheck="false" autocomplete="off"
               placeholder="eval in app scope — Enter to run, &uarr;/&darr; history" />
      </div>
    </section>
  </div>
</main>

<div id="shots" class="hidden"></div>

<footer>
  <div class="tbBtns">
    <button id="btnPause" title="pause (freeze the world)">&#9208;</button>
    <button id="btnResume" title="resume">&#9654;</button>
    <button id="btnStep" title="step one frame">&#9197;</button>
  </div>
  <canvas id="strip" title="input tape — click a frame to seek"></canvas>
  <span id="stripInfo">no tape</span>
  <div class="tbBtns">
    <button id="btnLoadTape" title="dump the device's flight recorder">Load tape</button>
    <button id="btnExport" title="download the last tape as JSON" disabled>Export</button>
    <button id="btnReplay" title="replay a tape JSON file">Replay file&hellip;</button>
    <input id="replayFile" type="file" accept=".json,application/json" hidden />
  </div>
</footer>

<script type="module" src="./devtools.js"></script>
</body>
</html>
