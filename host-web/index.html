<!doctype html>
<!-- PocketJS dev host: 480x272 canvas playground, demo picker, virtual buttons.
     Serve with: bun host-web/serve.ts   (or bun scripts/dev.ts) -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PocketJS playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; padding: 24px; background: #0b0e17; color: #cbd5e1;
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  h1 { font-size: 16px; margin: 0; color: #e2e8f0; }
  #screen {
    width: 960px; height: 544px; /* 2x logical 480x272 */
    max-width: 100%;
    image-rendering: pixelated;
    background: #000; border: 1px solid #1e293b; border-radius: 6px;
  }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  select, button {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
    border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
  }
  button:active, button.held { background: #6366f1; border-color: #818cf8; }
  .pad button { min-width: 44px; }
  #keys { color: #64748b; font-size: 12px; text-align: center; }
  #log {
    width: 960px; max-width: 100%; height: 90px; overflow-y: auto;
    background: #0f172a; border: 1px solid #1e293b; border-radius: 6px;
    padding: 8px; white-space: pre-wrap; font-size: 12px; color: #94a3b8;
  }
  #fps { color: #34d399; min-width: 60px; }
</style>
</head>
<body>
<h1>PocketJS playground</h1>
<div class="row">
  <select id="demo"></select>
  <button id="run">Run</button>
  <span id="fps"></span>
</div>
<canvas id="screen" width="480" height="272"></canvas>
<div class="row pad">
  <button data-btn="0x0100">L</button>
  <button data-btn="0x0080">&larr;</button>
  <button data-btn="0x0010">&uarr;</button>
  <button data-btn="0x0040">&darr;</button>
  <button data-btn="0x0020">&rarr;</button>
  <button data-btn="0x0200">R</button>
  <button data-btn="0x4000">CROSS</button>
  <button data-btn="0x2000">CIRCLE</button>
  <button data-btn="0x8000">SQUARE</button>
  <button data-btn="0x1000">TRIANGLE</button>
  <button data-btn="0x0001">SELECT</button>
  <button data-btn="0x0008">START</button>
</div>
<div id="keys">
  keyboard: arrows = d-pad &middot; Enter / Z = CIRCLE &middot; X = CROSS &middot;
  A = SQUARE &middot; S = TRIANGLE &middot; L / Q = LTRIGGER &middot; R / E = RTRIGGER &middot;
  Shift = SELECT &middot; Space = START
</div>
<pre id="log"></pre>

<script type="module">
  import { mount, load, listDemos, pressVirtual } from "./engine.js";

  const logEl = document.getElementById("log");
  const fpsEl = document.getElementById("fps");
  const demoEl = document.getElementById("demo");

  function log(msg) {
    logEl.textContent = (logEl.textContent + msg + "\n").slice(-8000);
    logEl.scrollTop = logEl.scrollHeight;
  }

  await mount(document.getElementById("screen"), {
    onLog: log,
    onFps: (f) => (fpsEl.textContent = f ? f + " fps" : ""),
  });

  const demos = await listDemos();
  if (demos.length === 0) {
    log("no bundles in dist/ — run: bun scripts/build.ts hero-main");
  }
  for (const d of demos) {
    const opt = document.createElement("option");
    opt.value = d.name;
    opt.textContent = d.name + (d.mounts ? "" : "  (component only — won't mount)");
    demoEl.appendChild(opt);
  }
  // Prefer a mounting entry (*-main) as the default selection.
  const preferred = demos.find((d) => d.mounts) ?? demos[0];
  if (preferred) demoEl.value = preferred.name;

  const run = () => load(demoEl.value);
  document.getElementById("run").addEventListener("click", run);
  demoEl.addEventListener("change", run);
  const boot = new URLSearchParams(location.search).get("demo");
  if (boot && demos.some((d) => d.name === boot)) demoEl.value = boot;
  if (preferred || boot) await run();

  // Virtual buttons: mouse + touch, release on leave.
  for (const el of document.querySelectorAll("[data-btn]")) {
    const bit = parseInt(el.dataset.btn, 16);
    const set = (down) => (e) => {
      e.preventDefault();
      el.classList.toggle("held", down);
      pressVirtual(bit, down);
    };
    el.addEventListener("mousedown", set(true));
    el.addEventListener("mouseup", set(false));
    el.addEventListener("mouseleave", set(false));
    el.addEventListener("touchstart", set(true), { passive: false });
    el.addEventListener("touchend", set(false));
    el.addEventListener("touchcancel", set(false));
  }
</script>
</body>
</html>
